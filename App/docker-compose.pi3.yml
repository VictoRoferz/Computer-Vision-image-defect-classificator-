version: '3.8'

services:
  # ============================================================
  # Server 1: Camera Service (Raspberry Pi 3)
  # ============================================================
  server1:
    build:
      context: ./server1_camera
      dockerfile: Dockerfile
    container_name: pcb-server1-camera
    ports:
      - "8001:8001"
    privileged: true  # Required for camera and GPIO access (GPIO nur nötig, wenn /button-Route genutzt wird)
    environment:
      # Camera configuration
      - USE_CAMERA=${SERVER1_USE_CAMERA:-false}  # Set to false for Mac testing
      - CAMERA_INDEX=${SERVER1_CAMERA_INDEX:-0}
      - CAMERA_WIDTH=${SERVER1_CAMERA_WIDTH:-1920}
      - CAMERA_HEIGHT=${SERVER1_CAMERA_HEIGHT:-1080}

      # Server 2 connection
      - SERVER2_URL=${SERVER2_URL:-http://pcb-server2-labelstudio:8002}
      - UPLOAD_TIMEOUT=${SERVER1_UPLOAD_TIMEOUT:-30}
      - UPLOAD_RETRIES=${SERVER1_UPLOAD_RETRIES:-3}

      # Storage
      - TEMP_DIR=/tmp/camera_captures
      - CLEANUP_AFTER_UPLOAD=${SERVER1_CLEANUP:-true}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    volumes:
      # Mount for development (hot reload)
      - ./server1_camera:/app
      # Temporary storage
      - server1_temp:/tmp/camera_captures

    devices:
      - "/dev/video0:/dev/video0"
      # Nur nötig, wenn der Server selbst noch GPIO nutzt (z.B. /api/v1/button):
      - "/dev/gpiomem:/dev/gpiomem"

    networks:
      - pcb-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # Button Listener: überwacht GPIO 23 und triggert Route
  # ============================================================
  button-listener:
    build:
      context: ./server1_camera
      dockerfile: Dockerfile
    container_name: pcb-button-listener
    privileged: true
    environment:
      - SERVER1_URL=http://pcb-server1-camera:8001
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./server1_camera:/app
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
    networks:
      - pcb-network
    depends_on:
      - server1
    restart: unless-stopped
    command: >
      python -m scripts.button_listener

# ============================================================
# Volumes
# ============================================================
volumes:
  server1_temp:
    driver: local
    name: pcb_server1_temp

# ============================================================
# Networks
# ============================================================
networks:
  pcb-network:
    driver: bridge
    name: pcb_network
