version: '3.8'

services:
  # ============================================================
  # Server 1: Camera Service (laptop webcam or sample image)
  # ============================================================
  server1:
    build:
      context: ./zander-prod-backend/backend/server1_camera
      dockerfile: Dockerfile
    container_name: pcb-server1-camera
    ports:
      - "8001:8001"
    environment:
      - USE_CAMERA=${USE_CAMERA:-false}
      - CAMERA_INDEX=${CAMERA_INDEX:-0}
      - CAMERA_WIDTH=${CAMERA_WIDTH:-1920}
      - CAMERA_HEIGHT=${CAMERA_HEIGHT:-1080}
      - SERVER2_URL=http://pcb-server2-labelstudio:8002
      - INFERENCE_URL=http://pcb-inference:8003
      - UPLOAD_TIMEOUT=${UPLOAD_TIMEOUT:-30}
      - UPLOAD_RETRIES=${UPLOAD_RETRIES:-3}
      - TEMP_DIR=/tmp/camera_captures
      - CLEANUP_AFTER_UPLOAD=${CLEANUP_AFTER_UPLOAD:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./zander-prod-backend/backend/server1_camera:/app
      - server1_temp:/tmp/camera_captures
    networks:
      - pcb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================
  # Server 2: Label Studio Service (storage + labeling backend)
  # ============================================================
  server2:
    build:
      context: ./zander-prod-backend/backend/server2_labelstudio
      dockerfile: Dockerfile
    container_name: pcb-server2-labelstudio
    ports:
      - "8002:8002"
    environment:
      - DATA_ROOT=/data
      - UNLABELED_DIR=/data/unlabeled
      - LABELED_DIR=/data/labeled
      - USE_CONTENT_ADDRESSING=${USE_CONTENT_ADDRESSING:-true}
      - LABELSTUDIO_URL=http://labelstudio:8080
      - LABELSTUDIO_API_KEY=${LABELSTUDIO_API_KEY:-}
      - LABELSTUDIO_PROJECT_ID=${LABELSTUDIO_PROJECT_ID:-}
      - LABELSTUDIO_PROJECT_NAME=${LABELSTUDIO_PROJECT_NAME:-PCB Defect Classification}
      - LABELSTUDIO_AUTO_CREATE_PROJECT=${LABELSTUDIO_AUTO_CREATE_PROJECT:-true}
      - LABELSTUDIO_ENABLE_WEBHOOKS=${LABELSTUDIO_ENABLE_WEBHOOKS:-true}
      - WEBHOOK_ENABLED=${WEBHOOK_ENABLED:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-50}
    volumes:
      - ./zander-prod-backend/backend/server2_labelstudio:/app
      - server2_data:/data
    networks:
      - pcb-network
    depends_on:
      - labelstudio
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # Label Studio: Annotation Platform
  # ============================================================
  labelstudio:
    image: heartexlabs/label-studio:latest
    container_name: pcb-labelstudio
    ports:
      - "8080:8080"
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/data
      - LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK=${LABELSTUDIO_DISABLE_SIGNUP:-false}
      - LABEL_STUDIO_LOCAL_FILES_ALLOW_UNDEFINED_URLS=true
      - LABEL_STUDIO_USERNAME=${LABELSTUDIO_USERNAME:-admin@example.com}
      - LABEL_STUDIO_PASSWORD=${LABELSTUDIO_PASSWORD:-admin123}
      - LABEL_STUDIO_HOST=${LABELSTUDIO_HOST:-}
    volumes:
      - labelstudio_data:/label-studio/data
      - server2_data:/data:ro
    networks:
      - pcb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================
  # Server 3: ML Inference Service (YOLOv8 defect detection)
  # ============================================================
  inference:
    build:
      context: ./zander-prod-backend/backend/server3_inference
      dockerfile: Dockerfile
    container_name: pcb-inference
    ports:
      - "8003:8003"
    environment:
      - MODEL_PATH=${MODEL_PATH:-models/yolov8n.pt}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.25}
      - SERVER2_URL=http://pcb-server2-labelstudio:8002
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./zander-prod-backend/backend/server3_inference:/app
      - inference_models:/app/models
      - server2_data:/data:ro
    networks:
      - pcb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================
  # Dashboard: Web UI for both workflows
  # ============================================================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: pcb-dashboard
    ports:
      - "3000:3000"
    environment:
      - SERVER1_URL=http://pcb-server1-camera:8001
      - SERVER2_URL=http://pcb-server2-labelstudio:8002
      - INFERENCE_URL=http://pcb-inference:8003
      - LABELSTUDIO_URL=http://labelstudio:8080
    networks:
      - pcb-network
    depends_on:
      - server1
      - server2
      - inference
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ============================================================
# Volumes
# ============================================================
volumes:
  server1_temp:
    driver: local
    name: pcb_server1_temp
  server2_data:
    driver: local
    name: pcb_server2_data
  labelstudio_data:
    driver: local
    name: pcb_labelstudio_data
  inference_models:
    driver: local
    name: pcb_inference_models

# ============================================================
# Networks
# ============================================================
networks:
  pcb-network:
    driver: bridge
    name: pcb_network
